# Example configuration for multi-provider setup
# Copy to ~/.config/acton-ai/config.toml or ./acton-ai.toml

default_provider = "ollama"

[providers.ollama]
type = "ollama"
model = "gemma4:26b"
# Change this to your Ollama server URL
base_url = "http://127.0.0.1:11434/v1"
timeout_secs = 300

[providers.ollama.rate_limit]
requests_per_minute = 1000
tokens_per_minute = 1000000

# Uncomment and add your API key to enable Claude
# [providers.claude]
# type = "anthropic"
# model = "claude-sonnet-4-20250514"
# api_key_env = "ANTHROPIC_API_KEY"

# Uncomment and add your API key to enable OpenAI
# [providers.fast]
# type = "openai"
# model = "gpt-4o-mini"
# api_key_env = "OPENAI_API_KEY"

# Sandbox configuration (optional)
# Uncomment to enable the portable ProcessSandbox for tool execution
# isolation. The parent re-execs the current binary, applies rlimits, and
# (on Linux) installs a best-effort landlock + seccomp filter before
# running the tool. No hypervisor required; works on Linux, macOS, and
# Windows.

# [sandbox]
# # OS-hardening policy: "off" | "besteffort" (default) | "enforce"
# hardening = "besteffort"
#
# [sandbox.limits]
# # Maximum execution time in milliseconds (default: 30000)
# max_execution_ms = 30000
# # Maximum memory (address space) in MB (default: 256)
# max_memory_mb = 256
