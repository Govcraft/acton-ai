name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build x86_64-unknown-linux-gnu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install x86_64-unknown-none target (for hyperlight guests)
        run: rustup target add x86_64-unknown-none

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang

      - name: Build release binary
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Determine version from tag
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: echo "version=${REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Package binary
        env:
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          ARCHIVE_NAME="acton-ai-${VERSION}-x86_64-unknown-linux-gnu"

          mkdir -p "staging/${ARCHIVE_NAME}"
          cp "target/x86_64-unknown-linux-gnu/release/acton-ai" "staging/${ARCHIVE_NAME}/"
          cp README.md LICENSE* 2>/dev/null || true

          cd staging
          tar czf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: acton-ai-x86_64-unknown-linux-gnu
          path: staging/*.tar.gz

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Determine version from tag
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: echo "version=${REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Collect archives
        run: |
          mkdir -p release
          find artifacts -name '*.tar.gz' -exec cp {} release/ \;
          ls -la release/

      - name: Generate checksums
        working-directory: release
        run: sha256sum *.tar.gz > checksums-sha256.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: acton-ai v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            release/*.tar.gz
            release/checksums-sha256.txt

  aur:
    name: Update AUR package
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Determine version from tag
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: echo "version=${REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download checksums
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          curl -sL "https://github.com/Govcraft/acton-ai/releases/download/v${VERSION}/checksums-sha256.txt" -o checksums.txt
          SHA_X86=$(grep x86_64-unknown-linux-gnu checksums.txt | awk '{print $1}')
          echo "SHA256_X86_64=${SHA_X86}" >> "$GITHUB_ENV"

      - name: Configure SSH for AUR
        env:
          AUR_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$AUR_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null
          cat >> ~/.ssh/config <<EOF
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur
            User aur
          EOF

      - name: Clone and update AUR package
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git clone ssh://aur@aur.archlinux.org/acton-ai-bin.git aur-pkg
          cd aur-pkg

          T=$(printf '\t')

          cat > PKGBUILD <<PKGBUILD_EOF
          # Maintainer: Roland Rodriguez <roland@govcraft.ai>
          pkgname=acton-ai-bin
          pkgver=${VERSION}
          pkgrel=1
          pkgdesc="An agentic AI framework built on the actor model — scriptable CLI with persistent sessions"
          arch=('x86_64')
          url="https://github.com/Govcraft/acton-ai"
          license=('MIT')
          provides=('acton-ai')
          conflicts=('acton-ai')

          source=("\${url}/releases/download/v\${pkgver}/acton-ai-\${pkgver}-x86_64-unknown-linux-gnu.tar.gz")
          sha256sums=('${SHA256_X86_64}')

          package() {
              install -Dm755 "acton-ai-\${pkgver}-x86_64-unknown-linux-gnu/acton-ai" "\${pkgdir}/usr/bin/acton-ai"
          }
          PKGBUILD_EOF

          cat > .SRCINFO <<SRCINFO_EOF
          pkgbase = acton-ai-bin
          ${T}pkgdesc = An agentic AI framework built on the actor model — scriptable CLI with persistent sessions
          ${T}pkgver = ${VERSION}
          ${T}pkgrel = 1
          ${T}url = https://github.com/Govcraft/acton-ai
          ${T}arch = x86_64
          ${T}license = MIT
          ${T}provides = acton-ai
          ${T}conflicts = acton-ai
          ${T}source = https://github.com/Govcraft/acton-ai/releases/download/v${VERSION}/acton-ai-${VERSION}-x86_64-unknown-linux-gnu.tar.gz
          ${T}sha256sums = ${SHA256_X86_64}

          pkgname = acton-ai-bin
          SRCINFO_EOF

          git config user.name "Roland Rodriguez"
          git config user.email "roland@govcraft.ai"
          git add PKGBUILD .SRCINFO
          git commit -m "Update to ${VERSION}"
          git push origin master
